<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1080" viewBox="0 0 1400 1080" role="img" aria-labelledby="title desc">
  <title id="title">Healthcare Standards Query Flow</title>
  <desc id="desc">Simplified architecture diagram showing the MCP client, the three primary tools, standards service, semantic search path, direct lookup path, and final response generation.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #0f172a; stroke-width: 2; rx: 16; ry: 16; }
      .panel { fill: #eef2ff; stroke: #0f172a; stroke-width: 2; rx: 18; ry: 18; }
      .accent { fill: #ecfeff; stroke: #0f172a; stroke-width: 2; rx: 16; ry: 16; }
      .db { fill: #ecfccb; stroke: #0f172a; stroke-width: 2; rx: 18; ry: 18; }
      .text { font-family: Arial, Helvetica, sans-serif; font-size: 22px; fill: #0f172a; }
      .small { font-size: 18px; }
      .tiny { font-size: 16px; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #334155; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: bold; fill: #0f172a; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="1080" />
  <text class="title" x="700" y="48" text-anchor="middle">Healthcare Standards Query Flow</text>

  <rect class="box" x="530" y="80" width="340" height="64" />
  <text class="text" x="700" y="118" text-anchor="middle">User Query</text>

  <rect class="box" x="520" y="180" width="360" height="64" />
  <text class="text" x="700" y="218" text-anchor="middle">LLM / MCP Client</text>

  <rect class="panel" x="220" y="290" width="960" height="190" />
  <text class="text" x="700" y="330" text-anchor="middle">Three Primary MCP Tools</text>

  <rect class="accent" x="270" y="360" width="260" height="88" />
  <text class="text small" x="400" y="398" text-anchor="middle">search_standards</text>
  <text class="label" x="400" y="426" text-anchor="middle">semantic retrieval</text>

  <rect class="accent" x="570" y="360" width="260" height="88" />
  <text class="text small" x="700" y="398" text-anchor="middle">get_standard_by_chapter</text>
  <text class="label" x="700" y="426" text-anchor="middle">exact chapter text</text>

  <rect class="accent" x="870" y="360" width="260" height="88" />
  <text class="text small" x="1000" y="398" text-anchor="middle">list_sections</text>
  <text class="label" x="1000" y="426" text-anchor="middle">chapter and section discovery</text>

  <rect class="box" x="500" y="530" width="400" height="84" />
  <text class="text" x="700" y="570" text-anchor="middle">src/mcp-server.ts</text>
  <text class="text small" x="700" y="600" text-anchor="middle">tool registration and CallTool dispatch</text>

  <rect class="box" x="480" y="660" width="440" height="92" />
  <text class="text" x="700" y="702" text-anchor="middle">src/services/standards.service.ts</text>
  <text class="text small" x="700" y="732" text-anchor="middle">routing, retrieval, exact lookup, filtering, ranking</text>

  <rect class="panel" x="110" y="810" width="500" height="180" />
  <text class="text" x="360" y="850" text-anchor="middle">Semantic Search Path</text>
  <rect class="box" x="150" y="875" width="200" height="70" />
  <text class="text small" x="250" y="916" text-anchor="middle">runSemanticSearch</text>
  <rect class="box" x="385" y="875" width="185" height="70" />
  <text class="text tiny" x="478" y="905" text-anchor="middle">embeddings.ts</text>
  <text class="text tiny" x="478" y="928" text-anchor="middle">generateQueryEmbedding</text>
  <text class="label" x="360" y="972" text-anchor="middle">MongoDB Atlas vector search, then relevance filtering and top-5 ranking</text>

  <rect class="panel" x="790" y="810" width="500" height="180" />
  <text class="text" x="1040" y="850" text-anchor="middle">Direct Lookup Path</text>
  <rect class="box" x="830" y="875" width="210" height="70" />
  <text class="text small" x="935" y="905" text-anchor="middle">Chapter lookups</text>
  <text class="text tiny" x="935" y="928" text-anchor="middle">get_standard_by_chapter</text>
  <rect class="box" x="1065" y="875" width="185" height="70" />
  <text class="text tiny" x="1158" y="905" text-anchor="middle">Section discovery</text>
  <text class="text tiny" x="1158" y="928" text-anchor="middle">list_sections</text>
  <text class="label" x="1040" y="972" text-anchor="middle">Direct reads from MongoDB without embedding generation</text>

  <rect class="db" x="560" y="830" width="280" height="100" />
  <text class="text" x="700" y="872" text-anchor="middle">MongoDB Atlas</text>
  <text class="text small" x="700" y="902" text-anchor="middle">standards collection</text>

  <rect class="box" x="470" y="1015" width="460" height="38" />
  <text class="label" x="700" y="1040" text-anchor="middle">format evidence → MCP response → final NLP answer</text>

  <line class="arrow" x1="700" y1="144" x2="700" y2="180" />
  <line class="arrow" x1="700" y1="244" x2="700" y2="280" />
  <line class="arrow" x1="700" y1="480" x2="700" y2="530" />
  <line class="arrow" x1="700" y1="614" x2="700" y2="660" />
  <line class="arrow" x1="620" y1="752" x2="410" y2="810" />
  <line class="arrow" x1="780" y1="752" x2="990" y2="810" />
  <line class="arrow" x1="610" y1="900" x2="560" y2="892" />
  <line class="arrow" x1="790" y1="900" x2="840" y2="892" />
  <line class="arrow" x1="700" y1="930" x2="700" y2="1015" />
</svg>
